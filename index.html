<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>猜數字遊戲</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            padding-top: 80px;
        }

        .box {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            width: 300px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        input {
            padding: 10px;
            width: 80%;
            border-radius: 10px;
            border: none;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0072ff;
        }

        .msg {
            margin-top: 15px;
            font-size: 18px;
        }
    </style>

</head>

<body>

    <h1>🎮 猜數字遊戲</h1>

    <div class="box">

        <p class="msg">{{ message }}</p>

        <form method="POST">
            <input type="number" name="guess" placeholder="輸入 1~100" required>
            <br>
            <button type="submit">猜！</button>
        </form>

    </div>

</body>
</html>

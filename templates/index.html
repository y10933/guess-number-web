<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>猜數字 APP</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: "Arial";
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .app {
            width: 320px;
            background: rgba(255,255,255,0.08);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .msg {
            font-size: 18px;
            margin: 15px 0;
            min-height: 40px;
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            outline: none;
            text-align: center;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            width: 85%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #00c6ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #0072ff;
            transform: scale(1.05);
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

<div class="app">

    <div class="title">🎮 猜數字 APP</div>

    <div class="msg">{{ message }}</div>

    <form method="POST">
        <input type="number" name="guess" placeholder="輸入 1~100" required>
        <br>
        <button type="submit">猜！</button>
    </form>

    <div class="footer">
        Made with Flask 💻
    </div>

</div>

</body>
</html>

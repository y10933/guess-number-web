<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>猜數字 APP</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app {
            width: 340px;
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        input, select {
            width: 80%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            text-align: center;
        }

        button {
            width: 85%;
            margin-top: 10px;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
        }

        .box {
            margin-top: 15px;
        }

        .list {
            text-align: left;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="app">

    <h2>🎮 猜數字 APP</h2>

    <p>{{ message }}</p>

    <!-- 難度 -->
    <form method="POST">
        <select name="level">
            <option value="50" {% if level==50 %}selected{% endif %}>簡單 (1~50)</option>
            <option value="100" {% if level==100 %}selected{% endif %}>普通 (1~100)</option>
            <option value="500" {% if level==500 %}selected{% endif %}>困難 (1~500)</option>
        </select>
        <button type="submit">切換難度</button>
    </form>

    <!-- 猜數字 -->
    <form method="POST" class="box">
        <input type="number" name="guess" placeholder="輸入數字" required>
        <button type="submit">猜！</button>
    </form>

    <!-- 排行榜 -->
    <div class="list">
        🏆 最佳紀錄：
        <ul>
            {% for r in rank %}
                <li>{{ r }} 次</li>
            {% endfor %}
        </ul>
    </div>

    <!-- 🔥 每局猜測紀錄 -->
    <div class="list">
        📊 歷史猜測次數：
        <ul>
            {% for h in history %}
                <li>{{ h }} 次</li>
            {% endfor %}
        </ul>
    </div>

</div>

</body>
</html>
